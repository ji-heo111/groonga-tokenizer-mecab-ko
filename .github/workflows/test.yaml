name: Test
on:
  push:
    branches:
      - "**"
      - "!dependabot/**"
    tags:
      - "**"
  pull_request:
concurrency:
  group: ${{ github.head_ref || github.sha }}-${{ github.workflow }}
  cancel-in-progress: true
jobs:
  ubuntu:
    name: Ubuntu
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CCACHE_DIR: ${{ github.workspace }}/cache
    steps:
      - uses: actions/checkout@v6
      - name: Cache ccache
        uses: actions/cache@v5
        with:
          path: cache
          key: test-ubuntu-ccache-${{ hashFiles('tokenizers/**') }}
          restore-keys: test-ubuntu-ccache-
      - name: Install build dependencies
        run: |
          sudo apt install -y -V \
            autoconf \
            automake \
            build-essential \
            ccache \
            cmake \
            ninja-build \
            ruby-dev
      - name: Install Groonga
        run: |
          sudo apt install -y -V ca-certificates lsb-release wget
          wget https://packages.groonga.org/ubuntu/groonga-apt-source-latest-$(lsb_release --codename --short).deb
          sudo apt install -y -V \
            ./groonga-apt-source-latest-$(lsb_release --codename --short).deb
          sudo apt update
          sudo apt install -y -V \
            groonga \
            libgroonga-dev
      - name: Install mecab-ko
        run: |
          tar xf vendor/mecab-0.996-ko-0.9.2.tar.gz
          mkdir -p mecab-ko.build
          cd mecab-ko.build
          ../mecab-0.996-ko-0.9.2/configure --prefix=/usr
          make -j$(nproc) > /dev/null
          sudo make install
      - name: Install mecab-ko-dic
        run: |
          tar xf vendor/mecab-ko-dic-2.1.1-20180720.tar.gz
          cd mecab-ko-dic-2.1.1-20180720
          ./autogen.sh
          ./configure --prefix=/usr
          make -j$(nproc) > /dev/null
          sudo make install
          # groonga 패키지가 일본어 사전(mecab-ipadic)을 함께 설치하므로
          # mecabrc의 dicdir을 mecab-ko-dic으로 덮어씀
          sudo sed -i 's|^dicdir.*|dicdir = /usr/lib/mecab/dic/mecab-ko-dic|' \
            /usr/etc/mecabrc /etc/mecabrc 2>/dev/null || true
      - name: CMake
        run: |
          cmake -S . -B build -GNinja \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache
      - name: Build
        run: |
          cmake --build build
      - name: Install
        run: |
          sudo cmake --install build
      - name: Install grntest
        run: |
          sudo gem install grntest
      - name: Test
        run: |
          BUILD_DIR="$(pwd)/build" test/run.sh
  debian:
    name: Debian bookworm
    runs-on: ubuntu-latest
    container: debian:bookworm
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Install build dependencies
        run: |
          apt update
          apt install -y -V \
            autoconf \
            automake \
            build-essential \
            ca-certificates \
            cmake \
            ninja-build \
            ruby \
            ruby-dev \
            wget
      - name: Install Groonga
        run: |
          wget https://packages.groonga.org/debian/groonga-apt-source-latest-bookworm.deb
          apt install -y -V \
            ./groonga-apt-source-latest-bookworm.deb
          apt update
          apt install -y -V \
            groonga \
            libgroonga-dev
      - name: Install mecab-ko
        run: |
          tar xf vendor/mecab-0.996-ko-0.9.2.tar.gz
          mkdir -p mecab-ko.build
          cd mecab-ko.build
          ../mecab-0.996-ko-0.9.2/configure --prefix=/usr
          make -j$(nproc) > /dev/null
          make install
      - name: Install mecab-ko-dic
        run: |
          tar xf vendor/mecab-ko-dic-2.1.1-20180720.tar.gz
          cd mecab-ko-dic-2.1.1-20180720
          ./autogen.sh
          ./configure --prefix=/usr
          make -j$(nproc) > /dev/null
          make install
      - name: CMake
        run: |
          cmake -S . -B build -GNinja
      - name: Build
        run: |
          cmake --build build
      - name: Install
        run: |
          cmake --install build
      - name: Install grntest
        run: |
          gem install grntest
      - name: Test
        run: |
          BUILD_DIR="$(pwd)/build" test/run.sh
  almalinux-8:
    name: AlmaLinux 8
    runs-on: ubuntu-latest
    container: almalinux:8
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Install build dependencies
        run: |
          dnf install -y epel-release
          dnf config-manager --set-enabled powertools
          dnf module reset ruby -y
          dnf module enable ruby:3.1 -y
          dnf install -y \
            autoconf \
            automake \
            cmake \
            curl \
            gcc \
            gcc-c++ \
            make \
            ninja-build \
            ruby \
            ruby-devel
      - name: Install newer CMake
        run: |
          curl -sL https://github.com/Kitware/CMake/releases/download/v3.28.6/cmake-3.28.6-linux-x86_64.tar.gz \
            | tar xz --strip-components=1 -C /usr/local
      - name: Install Apache Arrow
        run: |
          dnf install -y \
            https://packages.apache.org/artifactory/arrow/almalinux/8/apache-arrow-release-latest.rpm
      - name: Install Groonga
        run: |
          dnf install -y \
            https://packages.groonga.org/almalinux/8/groonga-release-latest.noarch.rpm
          dnf install -y groonga groonga-devel
      - name: Install mecab-ko
        run: |
          tar xf vendor/mecab-0.996-ko-0.9.2.tar.gz
          mkdir -p mecab-ko.build
          cd mecab-ko.build
          ../mecab-0.996-ko-0.9.2/configure --prefix=/usr
          make -j$(nproc) > /dev/null
          make install
          ldconfig
      - name: Install mecab-ko-dic
        run: |
          tar xf vendor/mecab-ko-dic-2.1.1-20180720.tar.gz
          cd mecab-ko-dic-2.1.1-20180720
          ./autogen.sh
          ./configure --prefix=/usr
          make -j$(nproc) > /dev/null
          make install
          # mecabrc의 dicdir(/usr/lib/...)과 실제 설치 경로(/usr/lib64/...)가 다를 수 있음
          if [ ! -d /usr/lib/mecab ] && [ -d /usr/lib64/mecab ]; then
            ln -s /usr/lib64/mecab /usr/lib/mecab
          fi
      - name: CMake
        run: |
          cmake -S . -B build -GNinja
      - name: Build
        run: |
          cmake --build build
      - name: Install
        run: |
          cmake --install build
      - name: Install grntest
        run: |
          gem install grntest
      - name: Test
        run: |
          BUILD_DIR="$(pwd)/build" test/run.sh
  almalinux-9:
    name: AlmaLinux 9
    runs-on: ubuntu-latest
    container: almalinux:9
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Install build dependencies
        run: |
          dnf install -y epel-release
          dnf config-manager --set-enabled crb
          dnf install -y --allowerasing \
            autoconf \
            automake \
            cmake \
            curl \
            gcc \
            gcc-c++ \
            make \
            ninja-build \
            ruby \
            ruby-devel
      - name: Install Apache Arrow
        run: |
          dnf install -y \
            https://apache.jfrog.io/artifactory/arrow/almalinux/9/apache-arrow-release-latest.rpm
      - name: Install Groonga
        run: |
          dnf install -y \
            https://packages.groonga.org/almalinux/9/groonga-release-latest.noarch.rpm
          dnf install -y groonga groonga-devel
      - name: Install mecab-ko
        run: |
          tar xf vendor/mecab-0.996-ko-0.9.2.tar.gz
          mkdir -p mecab-ko.build
          cd mecab-ko.build
          ../mecab-0.996-ko-0.9.2/configure --prefix=/usr
          make -j$(nproc) > /dev/null
          make install
          ldconfig
      - name: Install mecab-ko-dic
        run: |
          tar xf vendor/mecab-ko-dic-2.1.1-20180720.tar.gz
          cd mecab-ko-dic-2.1.1-20180720
          ./autogen.sh
          ./configure --prefix=/usr
          make -j$(nproc) > /dev/null
          make install
          # mecabrc의 dicdir(/usr/lib/...)과 실제 설치 경로(/usr/lib64/...)가 다를 수 있음
          if [ ! -d /usr/lib/mecab ] && [ -d /usr/lib64/mecab ]; then
            ln -s /usr/lib64/mecab /usr/lib/mecab
          fi
      - name: CMake
        run: |
          cmake -S . -B build -GNinja
      - name: Build
        run: |
          cmake --build build
      - name: Install
        run: |
          cmake --install build
      - name: Install grntest
        run: |
          gem install grntest
      - name: Test
        run: |
          BUILD_DIR="$(pwd)/build" test/run.sh
  amazon-linux:
    name: Amazon Linux 2023
    runs-on: ubuntu-latest
    container: amazonlinux:2023
    timeout-minutes: 10
    steps:
      - name: Install archive tools
        run: |
          dnf install -y \
            gzip \
            tar
      - uses: actions/checkout@v6
      - name: Install build dependencies
        run: |
          dnf install -y \
            autoconf \
            automake \
            cmake \
            gcc \
            gcc-c++ \
            make \
            ninja-build \
            ruby \
            ruby-devel
      - name: Install Apache Arrow
        run: |
          dnf install -y \
            https://packages.apache.org/artifactory/arrow/amazon-linux/2023/apache-arrow-release-latest.rpm
      - name: Install Groonga
        run: |
          dnf install -y \
            https://packages.groonga.org/amazon-linux/2023/groonga-release-latest.noarch.rpm
          dnf install -y groonga groonga-devel
      - name: Install mecab-ko
        run: |
          tar xf vendor/mecab-0.996-ko-0.9.2.tar.gz
          mkdir -p mecab-ko.build
          cd mecab-ko.build
          ../mecab-0.996-ko-0.9.2/configure --prefix=/usr
          make -j$(nproc) > /dev/null
          make install
          ldconfig
      - name: Install mecab-ko-dic
        run: |
          tar xf vendor/mecab-ko-dic-2.1.1-20180720.tar.gz
          cd mecab-ko-dic-2.1.1-20180720
          ./autogen.sh
          ./configure --prefix=/usr
          make -j$(nproc) > /dev/null
          make install
          # mecabrc의 dicdir(/usr/lib/...)과 실제 설치 경로(/usr/lib64/...)가 다를 수 있음
          if [ ! -d /usr/lib/mecab ] && [ -d /usr/lib64/mecab ]; then
            ln -s /usr/lib64/mecab /usr/lib/mecab
          fi
      - name: CMake
        run: |
          cmake -S . -B build -GNinja
      - name: Build
        run: |
          cmake --build build
      - name: Install
        run: |
          cmake --install build
      - name: Install grntest
        run: |
          gem install grntest
      - name: Test
        run: |
          BUILD_DIR="$(pwd)/build" test/run.sh
